apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-sales-service
  labels:
    app: vehicle-sales-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vehicle-sales-service
  template:
    metadata:
      labels:
        app: vehicle-sales-service
    spec:
      containers:
        - name: vehicle-sales-service
          image: vehicle-sales-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://172.23.0.1:5433/db_vendas"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vehicle-sales-secrets
                  key: spring-datasource-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vehicle-sales-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION_MS
              value: "300000"
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: vehicle-sales-secrets
                  key: hmac-secret
            - name: RESERVA_EXPIRACAO_MINUTOS
              value: "10"
            - name: RESERVA_EXPIRACAO_INTERVALO_MS
              value: "60000"

          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
