name: CI - Validation Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR Source Branch (for main target)
        if: github.base_ref == 'main'
        run: |
          echo "Checking source branch for PR targeting main..."
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to main must only originate from the 'develop' branch. Received: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Validation successful: PR originates from 'develop'."

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Run Tests and Verify Coverage
        run: ./mvnw verify

      - name: Dependency Vulnerability Scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'
