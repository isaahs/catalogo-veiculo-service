name: CD - Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Application JAR
        run: ./mvnw clean package -DskipTests

      - name: Build Docker Image
        run: |
          docker build -t vehicle-catalog-service:latest .

      - name: Start Floci (AWS Emulator)
        run: |
          docker run -d --name floci -p 4566:4566 floci/floci:latest
          echo "Aguardando o Floci iniciar..."
          until curl -sf http://localhost:4566/_floci/health > /dev/null; do sleep 1; done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init & Apply
        run: |
          echo "Provisionando infraestrutura (RDS + EKS) via Terraform..."
          cd terraform
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_password_vendas: ${{ secrets.DB_PASSWORD_VENDAS }}

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to EKS
        run: |
          echo "Aplicando manifestos Kubernetes..."
          kubectl apply -f k8s/catalogo/ -f k8s/vendas/
