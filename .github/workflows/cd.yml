name: CD - Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Application JAR
        run: ./mvnw clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t vehicle-catalog-service:latest .

      - name: Start Floci (AWS Emulator)
        run: |
          docker run -d --name floci \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            floci/floci:latest
          echo "Aguardando Floci inicializar..."
          until curl -sf http://localhost:4566/_floci/health > /dev/null; \
            do sleep 2; done
          echo "✅ Floci pronto"
          sleep 10

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name eks-catalog-cluster
          kubectl get nodes
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Import images into k3s cluster
        run: |
          docker save vehicle-catalog-service:latest -o /tmp/catalog.tar
          K3S=$(docker ps --filter "name=floci-eks" --format "{{.Names}}" | head -1)
          echo "Container k3s: $K3S"
          docker cp /tmp/catalog.tar $K3S:/tmp/catalog.tar
          docker exec $K3S sh -c "ctr --namespace k8s.io images import /tmp/catalog.tar"
          docker exec $K3S sh -c "ctr --namespace k8s.io images ls | grep vehicle"

      - name: Connect databases to k3s network
        run: |
          NETWORK=$(docker inspect floci-eks-eks-catalog-cluster \
            --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v bridge | head -1)
          echo "Rede k3s: $NETWORK"
          docker network connect $NETWORK postgres-catalogo || true
          docker network connect $NETWORK db-vendas || true

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/catalogo/
          kubectl apply -f k8s/vendas/
          kubectl get pods
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test