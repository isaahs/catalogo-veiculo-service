services:
  postgres-catalogo:
    image: postgres:16-alpine
    container_name: postgres-catalogo
    environment:
      POSTGRES_DB: db_catalogo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata-catalogo:/var/lib/postgresql/data

volumes:
  pgdata-catalogo:
